name: Build Windows Executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pillow

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "Agnes-AI" --clean app.py

      - name: Create zip
        run: |
          Compress-Archive -Path dist\Agnes-AI.exe -DestinationPath dist\Agnes-AI-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Agnes-AI-Windows
          path: dist/Agnes-AI-Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Agnes-AI-Windows.zip
          generate_release_notes: true
